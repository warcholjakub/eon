graph {
  source = generated
  shape = three-clusters-hub
  node-count = 91
}

simulation {
  infection-probability = 0.05
  recovery-probability = 0.05
  initial-infected-count = 1
  seed = 42
  runs = 10
}

sweep {
  enabled = true
  min-probability = 0.05
  max-probability = 1.0
  probability-step = 0.05
  activations = [
    { on-ticks = 1, off-ticks = 0 }
    { on-ticks = 3, off-ticks = 1 }
    { on-ticks = 1, off-ticks = 1 }
    { on-ticks = 1, off-ticks = 3 }
  ]
}

output {
  dir = "out/studies/huj-sweep"
  visualization = false
}
