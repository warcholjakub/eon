preset = "balanced"

graph {
  source = generated
  shape = erdos

  # Ignored for source=generated; use for source=file
  file = "data/graph.csv"
  explicit-node-count = 200

  node-count = 200
  edge-probability = 0.02
  ring-degree = 6

  activation {
    on-ticks = 3
    off-ticks = 2
    phase = 0
  }
}

simulation {
  infection-probability = 0.08
  recovery-probability = 0.05
  max-ticks = 400
  stop-when-no-infected = true

  # Use either initial-infected or initial-infected-count
  initial-infected = [0, 1]
  # initial-infected-count = 3

  seed = 42
  runs = 1
}

output {
  dir = "out/from-config"
  visualization = true
}
